<html lang="en">
  <head>

    <meta name="mobile-web-app-capable" content="yes">
    <title>Arkaan - Painel Financeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.553.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react-dom/client": "https://aistudiocdn.com/react-dom@^19.2.0/client",
    "recharts": "https://aistudiocdn.com/recharts@^3.4.1",
    "@supabase/supabase-js": "https://aistudiocdn.com/@supabase/supabase-js@^2.45.0",
    "openai": "https://esm.sh/openai@4.52.7",
    "openai/": "https://aistudiocdn.com/openai@^6.9.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.1",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "vite": "https://aistudiocdn.com/vite@^7.2.4",
    "react-easy-crop": "https://esm.sh/react-easy-crop@5.0.8",

</script>
</head>
  <body class="bg-slate-50 dark:bg-slate-900">
    <style>
      /* Custom scrollbar for header */
      .header-scrollbar::-webkit-scrollbar {
        height: 4px;
        width: 4px;
      }
      .header-scrollbar::-webkit-scrollbar-thumb {
        background-color: #475569; /* slate-600 */
        border-radius: 4px;
      }
      .header-scrollbar:hover::-webkit-scrollbar-thumb {
        background-color: #64748b; /* slate-500 */
      }
      .header-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }

      /* Global Animations */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      /* Sophisticated Blur Animations */
      @keyframes blurIn {
        from { 
          opacity: 0; 
          filter: blur(10px);
        }
        to { 
          opacity: 1; 
          filter: blur(0);
        }
      }

      @keyframes blurInUp {
        from { 
          opacity: 0; 
          filter: blur(10px);
          transform: translateY(20px);
        }
        to { 
          opacity: 1; 
          filter: blur(0);
          transform: translateY(0);
        }
      }

      .animate-fade-in-up {
        animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      .animate-fade-in {
        animation: fadeIn 0.3s ease-out forwards;
      }

      .animate-blur-in {
        animation: blurIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .animate-blur-in-up {
        animation: blurInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Stagger delays */
      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }
      .delay-400 { animation-delay: 400ms; }
      .delay-500 { animation-delay: 500ms; }
    </style>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
